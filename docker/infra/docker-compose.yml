services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: assetradar-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: "${SA_PASSWORD}"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P $$MSSQL_SA_PASSWORD -Q 'SELECT 1' -C || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 25s

  redis:
    image: redis:7-alpine
    container_name: assetradar-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: assetradar-azurite
    ports:
      - "10000:10000" # Blob
      - "10001:10001" # Queue (opcional)
      - "10002:10002" # Table (opcional)
    volumes:
      - azurite_data:/data
    command: >
      azurite
      --blobHost 0.0.0.0 --blobPort 10000
      --queueHost 0.0.0.0 --queuePort 10001
      --tableHost 0.0.0.0 --tablePort 10002
      --location /data
      --debug /data/debug.log

volumes:
  sqlserver_data:
  redis_data:
  azurite_data:
